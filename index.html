  <h1>📁 Edder Utilities</h1>
  <h3>This collection was created by Edder! This website works out your brain, making you less ed. <a href="https://google.com/?igu=1">Source</a>.</h3>
  <h3>Read the <a href="https://google.com/?igu=1">disclaimer</a> before viewing this repo further.</h3>
  <h4>If nothing loads, ask Edder.</h4>
  <div id="file-tree">Loading...</div>

  <script>
    const user = "S-PScripts";
    const repo = "chromebook-utilities";
    const branch = "main";
    const apiBase = `https://api.github.com/repos/${user}/${repo}/contents/`;

    async function fetchTree(path = "") {
      const url = apiBase + path;
      const response = await fetch(url);
      if (!response.ok) {
        return `<li>Error loading ${path}</li>`;
      }
      const items = await response.json();

      if (!Array.isArray(items)) return "";

      const ul = document.createElement("ul");

      for (const item of items) {
        const li = document.createElement("li");

        if (item.type === "dir") {
          li.innerHTML = `<strong>📁 ${item.name}</strong>`;
          const subTree = await fetchTree(item.path);
          li.appendChild(subTree);
        } else if (item.type === "file") {
          const rawURL = `${window.location.origin}/${item.path}`;
          li.innerHTML = `<a href="${rawURL}" target="_blank">📄 ${item.name}</a>`;
        }

        ul.appendChild(li);
      }

      return ul;
    }

    fetchTree().then(tree => {
      const container = document.getElementById("file-tree");
      container.innerHTML = "";
      container.appendChild(tree);
    });
  </script>
</body>
