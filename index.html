<body>
  <!-- Password Screen -->
  <div id="login-screen">
    <h1>🔒 Edder Utilities</h1>
    <p>Enter the password to continue:</p>

    <input type="password" id="password-input" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>

    <p id="error-message" style="color:red;"></p>
  </div>

  <!-- Main Content (hidden until password entered) -->
  <div id="main-content" style="display:none;">
    <h1>📁 Edder Utilities</h1>
    <h3>
      This collection was created by Edder! This website works out your brain,
      making you less ed.
      <a href="https://google.com/?igu=1">Source</a>.
    </h3>
    <h3>
      Read the <a href="https://google.com/?igu=1">disclaimer</a>
      before viewing this repo further.
    </h3>
    <h4>If nothing loads, ask Edder.</h4>

    <div id="file-tree">Loading...</div>
  </div>

  <script>
    const PASSWORD = "edderxalex";

    function checkPassword() {
      const entered = document.getElementById("password-input").value;

      if (entered === PASSWORD) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";
      } else {
        document.getElementById("error-message").textContent =
          "❌ Incorrect password.";
      }
    }

    // Allow pressing Enter
    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkPassword();
      }
    });

    const user = "S-PScripts";
    const repo = "chromebook-utilities";
    const branch = "main";
    const apiBase = `https://api.github.com/repos/${user}/${repo}/contents/`;

    async function fetchTree(path = "") {
      const url = apiBase + path;
      const response = await fetch(url);

      if (!response.ok) {
        return document.createTextNode(`Error loading ${path}`);
      }

      const items = await response.json();
      if (!Array.isArray(items)) return document.createTextNode("");

      const ul = document.createElement("ul");

      for (const item of items) {
        const li = document.createElement("li");

        if (item.type === "dir") {
          li.innerHTML = `<strong>📁 ${item.name}</strong>`;
          const subTree = await fetchTree(item.path);
          li.appendChild(subTree);
        } else if (item.type === "file") {
          const rawURL = `${window.location.origin}/${item.path}`;
          li.innerHTML = `<a href="${rawURL}" target="_blank">📄 ${item.name}</a>`;
        }

        ul.appendChild(li);
      }

      return ul;
    }

    fetchTree().then(tree => {
      const container = document.getElementById("file-tree");
      container.innerHTML = "";
      container.appendChild(tree);
    });
  </script>
</body>
